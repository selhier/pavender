name: vendepro
description: "VendePro - Sistema de inventario y facturación offline-first"
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.2.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Local Database (offline-first)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  sqlite3: ^2.4.6
  path_provider: ^2.1.4
  path: ^1.9.0

  # Firebase (sync & auth)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2

  # Connectivity
  connectivity_plus: ^6.1.0
  internet_connection_checker_plus: ^2.6.0

  # PDF & Printing
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # Image
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  equatable: ^2.0.7
  collection: ^1.18.0
  rxdart: ^0.28.0
  simple_barcode_scanner: ^0.6.0
  http: ^1.6.0
  file_picker: ^8.1.4
  csv: ^6.0.0
  excel: ^4.0.6
  print_bluetooth_thermal: ^1.1.8
  esc_pos_utils_plus: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.20.3
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    backgroundColor: "#ffffff"
    themeColor: "#6C63FF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
